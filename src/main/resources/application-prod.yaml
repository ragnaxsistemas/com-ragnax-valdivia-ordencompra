    type: com.zaxxer.hikari.HikariDataSource

  # Configuración de Hikari (Global o específica)
  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
  jpa:
    #    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    enabled: true
  use-fqn: true


server:
  port: 9191
  servlet:
    context-path: /ccmvaldivia
    session:
      cookie:
        secure: true
    forward-headers-strategy: native

logging:
  file:
    name: logfile
    path: /
management:
  endpoint:
    import jakarta.persistence.s:
      enabled: true
    metrics:
      enabled: true
    health:
      show-details: always
  endpoints:
    web:
      base-path: /actuator/${spring.application.name}
      exposure:
        include: logfile,health

swagger:
  configuracion:
    apiinfo:
      titulo: ${spring.application.name} - ${spring.profiles.active}
      version: ${info.app.version}
      descripcion: Microservices ${spring.application.name}-> ${spring.profiles.active}
      termsOfServiceUrl: www.google.com
      license: Swagger license ${spring.profiles.active}
      licenseUrl: www.facebook.com
    documentacion:
      swgg: http://localhost:${server.port}/swagger-ui.html#
      docs: http://localhost:${server.port}/api-docs.yaml
    empresainfo:
      email: ceo@ragnaxsistemas.cl
      nombre: RagnaxSistemas
      url: www.ragnaxsistemas.cl

