    username: dbvaldivia
    password: "Pm8%$21"
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
  usuarios:
    jdbc-url: jdbc:mysql://127.0.0.1:3306/ragnax_usuario_prod?useSSL=false&allowPublicKeyRetrieval=true
    username: dbvaldivia
    password: "Pm8%$21"
