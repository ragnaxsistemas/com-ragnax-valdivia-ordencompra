spring:
  config:
    activate:
      on-profile: prod
  jpa:
    properties:
      hibernate:
        # Esto es vital para evitar el error de metadatos si una conexión tarda
        temp.use_jdbc_metadata_defaults: false
        dialect: org.hibernate.dialect.MariaDBDialect

datasource:
  primary:
